<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <!-- ~~~~~~~~~~~~~~ Font Awesome CDN ~~~~~~~~~~~~~~ -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>Amazon.com. Spend less. Smile more.</title>
</head>

<body>

    <!-- ! ---------------------------------- Navbar Started ---------------------------------- -->
    <nav>
        <div class="nav-main">
            <div class="nav-logo--main border">
                <img src="./logo.png" alt="">
            </div>
            <div class="nav-location--main border">
                <span>Deliver to</span>
                <div class="nav-location--icon">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Pakistan</span>
                </div>
            </div>
            <form class="nav-search--main">
                <select name="" id="">
                    <option selected="selected">All</option>
                    <option>All Departments</option>
                    <option>Arts &amp; Crafts</option>
                    <option>Automotive</option>
                    <option>Baby</option>
                    <option>Beauty &amp; Personal Care</option>
                    <option>Books</option>
                    <option>Boys' Fashion</option>
                    <option>Computers</option>
                    <option>Deals</option>
                    <option>Digital Music</option>
                    <option>Electronics</option>
                    <option>Girls' Fashion</option>
                    <option>Health &amp; Household</option>
                    <option>Home &amp; Kitchen</option>
                    <option>Industrial &amp; Scientific</option>
                    <option>Kindle Store</option>
                    <option>Luggage</option>
                    <option>Men's Fashion</option>
                    <option>Movies &amp; TV</option>
                    <option>Music, CDs &amp; Vinyl</option>
                    <option>Pet Supplies</option>
                    <option>Prime Video</option>
                    <option>Software</option>
                    <option>Sports &amp; Outdoors</option>
                    <option>Tools &amp; Home Improvement</option>
                    <option>Toys &amp; Games</option>
                    <option>Video Games</option>
                    <option>Women's Fashion</option>
                </select>
                <input type="text" placeholder="Search Amazon">
                <i class="fa-solid fa-magnifying-glass"></i>
            </form>
            <div class="lang-main border">
                <div class="flag-main">
                    <img src="https://img.freepik.com/premium-vector/vector-american-flag-background_921039-1687.jpg?semt=ais_hybrid&w=740&q=80"
                        alt="">
                </div>
                <span>EN</span>
                <i class="fa-solid fa-caret-down"></i>
            </div>
            <div class="account-main border">
                <span class="account-sub--script">Hello, sign in</span>
                <div class="account-main--script">
                    <span>Account & Lists</span>
                    <i class="fa-solid fa-caret-down"></i>
                </div>
            </div>
            <div class="orders-main border">
                <span class="account-sub--script">Returns</span>
                <span>& Orders</span>
            </div>
            <div class="cart-main border">
                <i class="fa-solid fa-cart-shopping"></i>
                <span>Cart</span>
            </div>
        </div>
        <div class="nav-belt"></div>
    </nav>
    <!-- ! ---------------------------------- Navbar Ended ---------------------------------- -->

</body>

</html>
