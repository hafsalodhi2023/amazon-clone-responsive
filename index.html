<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Amazon.com. Spend less. Smile more.</title>
</head>

<body>

    <!-- ! ************************* Nav Started ************************* -->
    <nav>
        <!-- ? Nav Logo -->
        <div class="nav-logo">
            <i class="fa-solid fa-bars"></i>
            <div class="logo-div">
                <img src="./logo.png" alt="">
            </div>
        </div>

        <!-- ? Nav Multiple -->
        <div class="nav-multiple">
            Multiple
        </div>

        <!-- ? Nav Search -->
        <div class="nav-search">
            <input type="text" placeholder="Search Amazon" class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>

        <!-- ? Nav Belt -->
        <div class="nav-belt">
            <span class="nav-belt--items"><i class="fa-solid fa-bars"></i>Video</span>
            <span class="nav-belt--items">Deals</span>
            <span class="nav-belt--items">Amazon Basics</span>
            <span class="nav-belt--items">Livestreams</span>
            <span class="nav-belt--items">Books</span>
            <span class="nav-belt--items">Best Sellers</span>
            <span class="nav-belt--items">Music</span>
            <span class="nav-belt--items">New Releases</span>
            <span class="nav-belt--items">Home</span>
            <span class="nav-belt--items">PC</span>
        </div>

        <!-- ? Nav Mobile Delivery -->
        <div class="nav-delivery--mb">
            <i class="fa-solid fa-location-dot"></i>
            <span class="first-script">Deliver to</span>
            <span class="sec-script">Pakistan</span>
        </div>
    </nav>
    <!-- ! ************************* Nav Ended ************************* -->

</body>

</html>
